name: GitHub Profile Automation

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at 12:00 AM UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  snake:

    runs-on: ubuntu-latest

    steps:

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ajaynarware2006-collab
          outputs: |
                dist/github-contribution-grid-snake.svg?palette=github-dark
                dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  streak:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Generate GitHub Streak
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >
            user=ajaynarware2006-collab&
            theme=tokyonight&
            hide_border=true&
            background=0D1117&
            ring=764BA2&
            fire=667EEA&
            stroke=667EEA&
            currStreakLabel=764BA2
          path: profile/streak.svg

      - name: Commit Streak
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak" || exit 0
          git push

  waka:

    runs-on: ubuntu-latest

    steps:

      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
